<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=
    , initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            box-sizing: border-box;
        }

        #main {
            display: flex;
            flex-wrap: wrap;
        }

        #main div {
            width: calc (100%/4);
            height: 50px;
            background: pink;
        }

        @media (max-width: 1000px) {
            #main div {
                width: calc(100%/2);
            }
        }
    </style>
</head>

<body>
    <div id="main">
        <div>A</div>
        <div>B</div>
        <div>C</div>
        <div>D</div>
        <div>E</div>
    </div>

</body>

</html>
