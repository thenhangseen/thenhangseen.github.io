<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 1: Flexbox 1</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oxygen:wght@300;400;700&display=swap');

        body {
            background-color: rgb(246, 245, 239);
        }

        h3 {
            font-weight: bold;
            font-family: "Oxygen", sans-serif;
            font-size: 21px;

        }

        p {
            font-weight: light;
            font-family: "Oxygen", sans-serif;
            font-size: 12px;
            line-height: 18px;
        }

        h3,
        p {
            margin: 12px;
        }

        img {
            border-radius: 7px;
        }

        .container {
            max-width: 1024px;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .project {
            background-color: white;
            padding: 17px;
            border-radius: 13px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="project">
            <img class="images" src="images/custom-img-017-copyright.jpg" width="100%">
            <h3>Residential projects</h3>
            <p>We build sustainable and modern homes for comfortable living.</p>
        </div>

        <div class="project">
            <img src="images/custom-img-018-copyright.jpg" width="100%">
            <h3>Commercial spaces</h3>
            <p>We create efficient, inspiring workspaces for businesses of all sizes.</p>
        </div>

        <div class="project">
            <img src="images/custom-img-019-copyright.jpg" width="100%">
            <h3>Infrastructure works</h3>
            <p>We develop strong, reliable infrastructure for growing communities.</p>
        </div>

    </div>
</body>

</html>
