<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 1: Responsive Menu</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oxygen:wght@300;400;700&display=swap');

        body {
            margin: 10px 15px;
        }

        .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .container2 {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 60px;
        }

        .logo {
            width: 150px;
        }

        .menu {
            text-decoration: none;
            justify-content: space-between;
            font-weight: 700;
            font-family: "Oxygen", sans-serif;
            font-size: 13px;

        }

        .black {
            color: #000;
        }

        .orange {
            color: #f8612a;
        }

        .contact {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .icons {
            margin-right: 10px;
            width: 20px;
        }

        .hamburger {
            margin-right: 10px;
            width: 20px;
        }

        .button {
            background-color: #f8612a;
            color: #fff;
            border: none;
            border-radius: 7px;
            font-size: 12px;
            padding: 10px 14px;
            cursor: pointer;
        }

        .phone {
            display: flex;
            align-items: center;
            text-decoration: none;
        }

        h3 {
            font-family: Arial, sans-serif;
            font-size: 13px;
            font-weight: bold;
            color: #000;
        }

        .hamburger {
            display: none;
        }

        @media screen and (max-width: 1200px) {

            .menu {
                display: none;
            }

            .button {
                display: none;
            }

            .hamburger {
                display: block;
            }
        }

        @media screen and (max-width: 700px) {

            .menu {
                display: none;
            }

            .phone {
                display: none;
            }

            .hamburger {
                display: block;
                height: 41.2px;
                width: 41.2px;
            }
        }
    </style>
</head>

<body>
    <div class="container">

        <div class="main logo container2">
            <a href="https://construction.elementra.themerex.net/" target="_self"><img class="logo"
                    src="images/elementralogo.webp"></a>
        </div>
        <div class="container2">
            <a class="black menu" href="https://construction.elementra.themerex.net/">Home</a>
            <a class="orange menu" href="https://construction.elementra.themerex.net/services/">Services</a>
            <a class="black menu" href="https://construction.elementra.themerex.net/work/">Work</a>
            <a class="black menu" href="https://construction.elementra.themerex.net/project-details/">Project
                Details</a>
            <a class="black menu" href="https://construction.elementra.themerex.net/contact/">Contact</a>
        </div>
        <div class="contact container2">
            <a class="phone" href="tel:5551234567" target="_blank">
                <div class="phone">
                    <img class="icons" src="images/phone-call.png">
                    <h3>555-123-4567</h3>
                </div>
            </a>
            <button class="button" type="button"
                onclick="window.open('https://construction.elementra.themerex.net/contact/')">Contact</button>
            <a class="hamburger" href="https://www.instagram.com/billieeilish/" target="_blank"><img class="icons"
                    src="images/hamburger.png"></a>

        </div>

    </div>
</body>

</html>
